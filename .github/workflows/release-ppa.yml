name: Release to PPA

# Triggered when a GitHub Release is published via the web UI.
# Publishing the release creates the tag, which is available as
# github.ref_name (e.g. "v0.1.0").  Draft releases do NOT trigger this.
on:
  release:
    types: [published]


jobs:
  upload-ppa:
    name: Upload ${{ matrix.distro }} to PPA
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        distro: [noble, questing, resolute]

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed so setuptools-scm can resolve the version
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential \
            devscripts \
            debhelper \
            dh-python \
            dput \
            pybuild-plugin-pyproject \
            python3-all \
            python3-setuptools \
            python3-setuptools-scm

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Parse version from tag
        # github.ref_name is the tag name, e.g. "v0.1.0" → VERSION="0.1.0"
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Stamp changelog for ${{ matrix.distro }}
        env:
          DEBEMAIL: ken@vandine.org
          DEBFULLNAME: Ken VanDine
        run: |
          dch \
            --newversion "${VERSION}-1~${{ matrix.distro }}1" \
            --distribution "${{ matrix.distro }}" \
            --force-distribution \
            "Release ${VERSION} for ${{ matrix.distro }}"

      - name: Build signed source package
        # SETUPTOOLS_SCM_PRETEND_VERSION is also set by debian/rules for
        # Launchpad binary builds; set it here too in case debuild needs it.
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.VERSION }}
        run: debuild -S -sa -k"${{ secrets.GPG_KEY_ID }}"

      - name: Upload to ppa:ken-vandine/ailab
        run: dput ppa:ken-vandine/ailab ../*.changes
