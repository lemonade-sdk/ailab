[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-dev-box"
version = "0.1.0"
description = "LXD-based AI development sandbox manager"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["lxd", "ai", "sandbox", "development", "ollama", "lemonade"]

[project.scripts]
ai-dev-box = "ai_dev_box.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_dev_box*"]

[tool.setuptools.package-data]
"ai_dev_box.scripts" = ["*.sh", "*.js", "*.py"]
