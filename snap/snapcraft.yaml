name: ailab
adopt-info: ailab
base: core24
summary: LXD-based sandboxes for running AI tools safely on Ubuntu
description: |
  AI Lab creates lightweight LXD containers pre-wired to use AI services
  running on your host (lemonade-server, ollama). Each container shares your
  home directory, keeping installed software isolated from the rest of your
  system.

  Use the CLI to create and manage sandboxes:

    ailab new mybox --install openclaw
    ailab run mybox
    ailab list

  Or use the web management interface — a browser-based dashboard with live
  progress, an in-browser terminal, and log tailing. It runs as a background
  daemon and is accessible at http://127.0.0.1:11500 by default.

  Configure the host and port:

    snap set ailab web.host=0.0.0.0
    snap set ailab web.port=11500

  Connect to an AI Lab Cloud hub for remote access:

    snap set ailab cloud.host=https://cloud.example.com
    snap set ailab cloud.token=<token from hub dashboard>
    snap set ailab cloud.user=<your GitHub username>
    snap set ailab cloud.device-id=<device name shown in dashboard>
    snap set ailab cloud.ports=11500,18789

license: GPL-3.0+
grade: stable
confinement: strict

contact: https://github.com/lemonade-sdk/ailab/issues
issues: https://github.com/lemonade-sdk/ailab/issues
source-code: https://github.com/lemonade-sdk/ailab
website: https://github.com/lemonade-sdk/ailab

apps:
  ailab:
    command: bin/ailab
    plugs:
      - lxd
      - home
      - network

  web:
    command: bin/ailab-web-wrapper
    daemon: simple
    restart-condition: on-failure
    plugs:
      - lxd
      - home
      - network
      - network-bind

parts:
  frontend:
    plugin: nil
    source: frontend
    build-packages:
      - nodejs
      - npm
    override-build: |
      npm ci --include=dev
      npx vite build --outDir dist
      mkdir -p $SNAPCRAFT_PART_INSTALL/web-static
      cp -r dist/. $SNAPCRAFT_PART_INSTALL/web-static/

  ailab:
    plugin: python
    source: .
    build-packages:
      - git
    python-packages:
      - pylxd>=2.4.0
      - fastapi>=0.110.0
      - uvicorn[standard]>=0.29.0
      - aiohttp>=3.9.0
    after:
      - frontend
    override-pull: |
      craftctl default
      VERSION=$(craftctl get version)
      if [ -z $VERSION ]; then
        VERSION=$(git describe --tags --abbrev=10)
        craftctl set version=$VERSION
      fi
    override-build: |
      mkdir -p $SNAPCRAFT_PART_BUILD/ailab/web/static
      cp -r $SNAPCRAFT_STAGE/web-static/. $SNAPCRAFT_PART_BUILD/ailab/web/static/
      craftctl default
    organize:
      bin/ailab: bin/ailab

  wrapper:
    plugin: dump
    source: snap/local
    organize:
      ailab-web-wrapper: bin/ailab-web-wrapper
